<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1a0a">
    <title>🎡 ROULETTE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes bgPulse {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes balanceWave {
            0% { transform: scale(1); }
            30% { transform: scale(1.1); }
            60% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        @keyframes bannerIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); }
            60% { opacity: 1; transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
        }
        @keyframes tabSlideIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-400px) rotate(720deg) scale(0); opacity: 0; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes ballJump {
            0%, 100% { margin-top: -124px; }
            25% { margin-top: -120px; }
            50% { margin-top: -128px; }
            75% { margin-top: -122px; }
        }
        @keyframes winGlow {
            0% { box-shadow: 0 0 30px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 80px rgba(255,215,0,0.8), 0 0 120px rgba(255,215,0,0.4); }
            100% { box-shadow: 0 0 30px rgba(255,215,0,0.3); }
        }
        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        body {
            background: linear-gradient(135deg, #0a1a0a, #0d1f0d 30%, #0a1a0a 60%, #0d1f0d 100%);
            background-size: 400% 400%;
            animation: bgPulse 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            touch-action: pan-y;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(76,175,80,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(247,151,30,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .balance {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s;
        }
        .balance.wave {
            animation: balanceWave 0.6s cubic-bezier(0.4,0,0.2,1);
        }
        .balance-icon {
            font-size: 22px;
            animation: float 3s ease-in-out infinite;
        }
        .balance-amount {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(180deg, #ffd700, #4CAF50);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 6px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.45);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, #4CAF50, #ffd200);
            border-radius: 3px;
            transition: transform 0.4s;
        }
        .tab-btn.active::after {
            transform: translateX(-50%) scaleX(1);
        }
        .tab-btn.active {
            background: linear-gradient(180deg, rgba(76,175,80,0.2), rgba(247,151,30,0.12));
            color: white;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: tabSlideIn 0.5s ease;
        }

        .game-area {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .section-title {
            font-size: 12px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        /* Single roulette */
        .roulette-wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.2), 0 0 120px rgba(255,215,0,0.1);
        }
        .roulette-wheel-container.win-anim {
            animation: winGlow 1s ease-in-out 3, winPulse 0.5s ease-in-out 3;
        }
        .roulette-outer {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 6px solid #5d4037;
            position: relative;
            overflow: visible;
        }
        .roulette-ring {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.17,0.89,0.32,1.25);
            z-index: 1;
        }
        .roulette-ball {
            position: absolute;
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 40% 40%, #fff, #ccc);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            margin-left: -7px;
            margin-top: -124px;
            box-shadow: 0 0 12px rgba(255,255,255,0.8);
            transition: all 5s cubic-bezier(0.17,0.89,0.32,1.25);
            z-index: 5;
            animation: ballJump 0.3s ease-in-out infinite;
        }
        .roulette-ball.stopped {
            animation: none;
        }
        .roulette-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            margin-left: -20px;
            margin-top: -20px;
            background: radial-gradient(circle, #a08060, #6d4c30);
            border-radius: 50%;
            border: 3px solid #4a3020;
            z-index: 4;
        }
        .roulette-result-num {
            font-size: 44px;
            font-weight: 800;
            min-height: 55px;
            margin: 6px 0;
        }

        /* Bet buttons */
        .bet-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .bet-option {
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 14px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 70px;
        }
        .bet-option:active {
            transform: scale(0.94);
        }
        .bet-option.selected {
            background: linear-gradient(180deg, #4CAF50, #2E7D32);
            color: white;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(76,175,80,0.5);
            border-color: #4CAF50;
        }
        .bet-option.red-sel {
            background: linear-gradient(180deg, #c0392b, #8B0000) !important;
            box-shadow: 0 6px 20px rgba(255,50,50,0.5) !important;
            border-color: #ff4444 !important;
        }
        .bet-option.black-sel {
            background: linear-gradient(180deg, #333, #000) !important;
            box-shadow: 0 6px 20px rgba(255,255,255,0.2) !important;
            border-color: #888 !important;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
            text-align: center;
        }
        input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76,175,80,0.2);
        }

        .free-spin-card {
            background: rgba(76,175,80,0.08);
            border: 1px solid rgba(76,175,80,0.2);
            border-radius: 16px;
            padding: 12px 16px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .free-spin-card.checked {
            background: rgba(76,175,80,0.15);
            border-color: rgba(76,175,80,0.5);
            box-shadow: 0 0 20px rgba(76,175,80,0.3);
        }
        .free-spin-badge {
            background: #4CAF50;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 12px;
            margin-left: auto;
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 250;
            animation: confetti 2s ease-out forwards;
        }
        .center-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(180deg, rgba(0,0,0,0.95), rgba(15,25,15,0.95));
            padding: 24px 36px;
            border-radius: 24px;
            z-index: 200;
            text-align: center;
            font-weight: 800;
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            pointer-events: none;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .center-banner.show {
            animation: bannerIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        .center-banner.win {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.6);
        }
        .center-banner.lose {
            color: #ff6b6b;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.3s;
            color: white;
        }
        .action-btn.gold {
            background: linear-gradient(180deg, #f7971e, #e65100);
            box-shadow: 0 6px 20px rgba(247,151,30,0.4);
        }
        .action-btn.green {
            background: linear-gradient(180deg, #4CAF50, #2E7D32);
            box-shadow: 0 6px 20px rgba(76,175,80,0.35);
        }
        .action-btn.ghost {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .action-btn:active {
            transform: scale(0.96);
        }
        .action-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            z-index: 300;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 16px auto;
        }
        .error-text {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }
        .retry-btn {
            margin-top: 12px;
            padding: 8px 20px;
            background: #f7971e;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(160deg, rgba(25,40,25,0.95), rgba(15,25,15,0.95));
            border-radius: 28px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            animation: popIn 0.3s ease;
        }
        .profile-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        @media (max-width: 380px) {
            .roulette-wheel-container {
                width: 220px;
                height: 220px;
            }
            .roulette-outer {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div style="font-size:14px;opacity:0.7;margin-top:12px;">Загрузка...</div>
    </div>

    <div class="app-container">

        <!-- HEADER -->
        <div class="header">
            <div>
                <div style="font-size:18px;font-weight:800;">🎡 ROULETTE</div>
                <div style="font-size:12px;opacity:0.5;">European Casino</div>
            </div>
            <div class="balance" id="balanceCard">
                <span class="balance-icon">💰</span>
                <span class="balance-amount" id="balanceDisplay">0.00$</span>
            </div>
        </div>

        <!-- TABS -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="single">🎡 Рулетка</button>
            <button class="tab-btn" data-tab="multiplayer">👥 Мультиплеер</button>
            <button class="tab-btn" data-tab="profile">👤 Профиль</button>
        </div>

        <!-- SINGLE -->
        <div class="tab-content active" id="tab-single">
            <div class="game-area">
                <div class="roulette-wheel-container" id="wheelClickArea">
                    <div class="roulette-outer">
                        <div class="roulette-ring" id="rouletteRing"></div>
                        <div class="roulette-ball" id="rouletteBall"></div>
                        <div class="roulette-center"></div>
                    </div>
                </div>
                <div class="roulette-result-num" id="resultNum"></div>
                <div style="font-size:13px;opacity:0.6;" id="resultText">Выберите ставку и нажмите на колесо</div>
            </div>
            <div class="game-area">
                <div class="section-title">Выберите ставку</div>
                <div class="bet-buttons" id="betGrid">
                    <button class="bet-option" data-bet="red">🔴 Красное ×2</button>
                    <button class="bet-option" data-bet="black">⚫ Чёрное ×2</button>
                    <button class="bet-option" data-bet="even">🔵 Чёт ×2</button>
                    <button class="bet-option" data-bet="odd">🟣 Нечет ×2</button>
                    <button class="bet-option" data-bet="zero">🟢 ZERO ×36</button>
                    <button class="bet-option" data-bet="number" id="numberBetBtn">🔢 Число ×36</button>
                </div>
                <input type="number" id="numberBetInput" value="17" min="0" max="36" placeholder="Число 0-36" style="display:none;margin-top:5px;">
                <input type="number" id="betAmount" value="" min="0.1" step="0.1" placeholder="Сумма ставки ($)">
                <div style="display:flex;gap:5px;margin-bottom:8px;">
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="0.5">0.5$</button>
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="1">1$</button>
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="5">5$</button>
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="10">10$</button>
                </div>
                <div class="free-spin-card" id="freeSpinToggle">
                    <span>🎁 Бесплатный спин</span>
                    <span class="free-spin-badge" id="freeSpinCount">0</span>
                </div>
            </div>
        </div>

        <!-- MULTIPLAYER -->
        <div class="tab-content" id="tab-multiplayer">
            <div class="game-area">
                <div style="font-size:48px;animation:float 3s ease-in-out infinite;">👥</div>
                <div style="font-size:16px;font-weight:700;margin-top:8px;">Мультиплеер</div>
                <div style="font-size:13px;opacity:0.5;margin-top:4px;">В разработке</div>
            </div>
        </div>

        <!-- PROFILE -->
        <div class="tab-content" id="tab-profile">
            <div class="game-area">
                <div style="font-size:60px;animation:float 3s ease-in-out infinite;">👤</div>
                <div style="font-size:18px;font-weight:700;margin-top:8px;" id="profileName">Игрок</div>
                <div style="font-size:12px;opacity:0.5;margin-top:4px;">ID: <span id="profileId">---</span></div>
            </div>
            <div class="game-area">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:12px;text-align:center;">
                        <div style="font-size:11px;opacity:0.5;">Баланс</div>
                        <div style="font-size:20px;font-weight:800;color:#ffd700;" id="profileBalance">0.00$</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:12px;text-align:center;">
                        <div style="font-size:11px;opacity:0.5;">Спинов</div>
                        <div style="font-size:20px;font-weight:800;color:#4CAF50;" id="profileSpins">0</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:12px;text-align:center;">
                        <div style="font-size:11px;opacity:0.5;">Игр</div>
                        <div style="font-size:20px;font-weight:800;" id="profileGames">0</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:12px;text-align:center;">
                        <div style="font-size:11px;opacity:0.5;">Побед</div>
                        <div style="font-size:20px;font-weight:800;color:#4CAF50;" id="profileWins">0</div>
                    </div>
                </div>
                <div class="profile-buttons">
                    <button class="action-btn gold" id="profileDepositBtn">💳 Пополнить</button>
                    <button class="action-btn green" id="profileWithdrawBtn">💸 Вывести</button>
                </div>
            </div>
        </div>

        <div class="center-banner" id="centerBanner"></div>
    </div>

    <!-- DEPOSIT MODAL -->
    <div class="modal-overlay" id="depositModal">
        <div class="modal">
            <div style="font-size:20px;font-weight:800;margin-bottom:16px;text-align:center;">💳 Пополнение</div>
            <input type="number" id="depositAmount" value="10" min="1" placeholder="Сумма ($)">
            <p style="font-size:11px;opacity:0.5;text-align:center;margin-bottom:12px;">Оплата через CryptoBot (USDT)</p>
            <button class="action-btn gold" id="depositConfirmBtn">Оплатить</button>
            <p style="font-size:11px;opacity:0.4;text-align:center;margin-top:8px;" id="depositStatus"></p>
            <button class="action-btn ghost" id="depositCloseBtn">Закрыть</button>
        </div>
    </div>

    <!-- WITHDRAW MODAL -->
    <div class="modal-overlay" id="withdrawModal">
        <div class="modal">
            <div style="font-size:20px;font-weight:800;margin-bottom:16px;text-align:center;">💸 Вывод</div>
            <p style="font-size:13px;opacity:0.7;text-align:center;">Доступно: <span id="withdrawAvailable" style="color:#4CAF50;">0.00$</span></p>
            <p style="font-size:11px;opacity:0.5;text-align:center;margin-bottom:8px;">Мин. 2 игры. Сыграно: <span id="withdrawGames">0</span></p>
            <input type="number" id="withdrawAmount" placeholder="Сумма">
            <input type="text" id="withdrawWallet" placeholder="USDT адрес или @username">
            <button class="action-btn green" id="withdrawConfirmBtn">Вывести</button>
            <button class="action-btn ghost" id="withdrawCloseBtn">Закрыть</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЯ
        // ═══════════════════════════════════════
        const tg = window.Telegram?.WebApp;
        let user = null;

        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe?.user) {
                user = {
                    id: tg.initDataUnsafe.user.id,
                    username: tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || 'Player',
                    firstName: tg.initDataUnsafe.user.first_name || 'Player'
                };
            }
        }

        // Если не в Telegram — пробуем URL параметр
        if (!user) {
            const params = new URLSearchParams(window.location.search);
            const uid = params.get('user_id');
            if (uid && /^\d+$/.test(uid)) {
                user = {
                    id: parseInt(uid),
                    username: 'player_' + uid,
                    firstName: 'Player ' + uid
                };
            }
        }

        // Если всё ещё нет пользователя — ошибка
        if (!user) {
            document.getElementById('loadingOverlay').innerHTML =
                '<div style="font-size:40px;">⚠️</div>' +
                '<div style="font-size:16px;margin-top:12px;">Откройте через Telegram Mini App</div>';
            throw new Error('No user');
        }

        const API_URL = 'https://roulette-bot-8i8t.onrender.com';

        // Сокращения
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        // ═══════════════════════════════════════
        // СОСТОЯНИЕ
        // ═══════════════════════════════════════
        let state = {
            balance: 0,
            freeSpins: 0,
            totalGames: 0,
            wins: 0,
            selectedBet: null,
            isSpinning: false,
            gamesSinceWithdrawal: 0
        };

        let wheelRotation = 0;
        let audioCtx = null;
        let pendingPaymentId = null;
        let paymentCheckInterval = null;

        // ═══════════════════════════════════════
        // УТИЛИТЫ
        // ═══════════════════════════════════════
        function showError(msg) {
            const overlay = $('#loadingOverlay');
            if (overlay) {
                overlay.innerHTML =
                    '<div style="font-size:40px;margin-bottom:10px;">⚠️</div>' +
                    '<div class="error-text">' + msg + '</div>' +
                    '<button class="retry-btn" onclick="location.reload()">🔄 Перезагрузить</button>';
            }
        }

        function hideLoading() {
            const el = $('#loadingOverlay');
            if (el && el.querySelector('.loading-spinner')) {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.5s';
                setTimeout(function() {
                    if (el.parentNode) el.remove();
                }, 500);
            }
        }

        function toast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(function() {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
                setTimeout(function() {
                    if (t.parentNode) t.remove();
                }, 300);
            }, 2000);
        }

        function vibrate(ms) {
            if (navigator.vibrate) navigator.vibrate(ms || 12);
        }

        function showCenterBanner(text, type) {
            const banner = $('#centerBanner');
            if (!banner) return;
            banner.innerHTML = text;
            banner.className = 'center-banner ' + type + ' show';
            clearTimeout(banner._timeout);
            banner._timeout = setTimeout(function() {
                banner.className = 'center-banner ' + type;
            }, 2200);
        }

        function getAudioContext() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            } catch (e) {
                return null;
            }
        }

        document.addEventListener('touchstart', function() { getAudioContext(); }, { once: true });
        document.addEventListener('click', function() { getAudioContext(); }, { once: true });

        function playSpinSound() {
            try {
                const a = getAudioContext();
                if (!a) return;
                const duration = 5;
                const sr = a.sampleRate;
                const buffer = a.createBuffer(1, duration * sr, sr);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    const t = i / sr;
                    const p = t / duration;
                    data[i] = (Math.random() * 2 - 1) * 0.015 * (1 - p * 0.7) * (0.3 + 0.7 * Math.sin(2 * Math.PI * (6 + p * 40) * t));
                }
                const src = a.createBufferSource();
                src.buffer = buffer;
                const flt = a.createBiquadFilter();
                flt.type = 'bandpass';
                flt.frequency.value = 500;
                const g = a.createGain();
                g.gain.setValueAtTime(0.04, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + duration);
                src.connect(flt);
                flt.connect(g);
                g.connect(a.destination);
                src.start();
                src.stop(a.currentTime + duration);
            } catch (e) {}
        }

        function playWinSound() {
            try {
                const a = getAudioContext();
                if (!a) return;
                [784, 988, 1175].forEach(function(f, i) {
                    const o = a.createOscillator();
                    const g = a.createGain();
                    o.type = 'sine';
                    o.frequency.value = f;
                    const t = a.currentTime + i * 0.15;
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.06, t + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                    o.connect(g);
                    g.connect(a.destination);
                    o.start(t);
                    o.stop(t + 0.35);
                });
            } catch (e) {}
        }

        function playLoseSound() {
            try {
                const a = getAudioContext();
                if (!a) return;
                const o = a.createOscillator();
                const g = a.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(220, a.currentTime);
                o.frequency.linearRampToValueAtTime(140, a.currentTime + 0.4);
                g.gain.setValueAtTime(0.03, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.4);
                o.connect(g);
                g.connect(a.destination);
                o.start();
                o.stop(a.currentTime + 0.4);
            } catch (e) {}
        }

        function spawnConfetti() {
            try {
                document.querySelectorAll('.confetti').forEach(function(el) { el.remove(); });
                const colors = ['#ffd700', '#ff6b6b', '#4CAF50', '#f7971e'];
                for (let i = 0; i < 40; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.style.left = (30 + Math.random() * 40) + '%';
                    el.style.top = (40 + Math.random() * 20) + '%';
                    el.style.width = (5 + Math.random() * 8) + 'px';
                    el.style.height = (5 + Math.random() * 8) + 'px';
                    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    document.body.appendChild(el);
                }
                setTimeout(function() {
                    document.querySelectorAll('.confetti').forEach(function(el) { el.remove(); });
                }, 3000);
            } catch (e) {}
        }

        // ═══════════════════════════════════════
        // ЧАСТИЦЫ ФОНА
        // ═══════════════════════════════════════
        const pCanvas = $('#particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function createParticle() {
            return {
                x: Math.random() * pCanvas.width,
                y: pCanvas.height + 10,
                size: 1 + Math.random() * 2.5,
                speed: 0.2 + Math.random() * 0.8,
                opacity: 0.1 + Math.random() * 0.3,
                color: Math.random() < 0.5 ? '#ffd700' : (Math.random() < 0.5 ? '#4CAF50' : '#f7971e'),
                wobble: Math.random() * Math.PI * 2
            };
        }

        for (let i = 0; i < 50; i++) {
            const p = createParticle();
            p.y = Math.random() * pCanvas.height;
            particles.push(p);
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            particles.forEach(function(p) {
                p.y -= p.speed;
                p.x += Math.sin(p.wobble) * 0.2;
                p.wobble += 0.02;
                if (p.y < -10) {
                    p.y = pCanvas.height + 10;
                    p.x = Math.random() * pCanvas.width;
                }
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                pCtx.fillStyle = p.color;
                pCtx.globalAlpha = p.opacity;
                pCtx.fill();
                pCtx.globalAlpha = 1;
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ═══════════════════════════════════════
        // API ЗАПРОСЫ
        // ═══════════════════════════════════════
        async function api(endpoint, data) {
            data = data || {};
            try {
                const response = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        ...data
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(function() { return {}; });
                    throw new Error(errorData.error || 'HTTP ' + response.status);
                }

                return await response.json();
            } catch (e) {
                console.error('API error:', e);
                toast('Ошибка: ' + e.message);
                throw e;
            }
        }

        async function loadUser() {
            try {
                const data = await api('/api/get_balance');
                if (data.success) {
                    state.balance = data.balance || 0;
                    state.freeSpins = data.free_spins || 0;
                    state.totalGames = data.total_games || 0;
                    state.wins = data.wins || 0;
                    state.gamesSinceWithdrawal = data.games_since_withdrawal || 0;
                    updateUI();
                }
                hideLoading();
            } catch (e) {
                showError('Не удалось загрузить данные.');
            }
        }

        function updateUI() {
            $('#balanceDisplay').textContent = state.balance.toFixed(2) + '$';
            $('#profileBalance').textContent = state.balance.toFixed(2) + '$';
            $('#profileSpins').textContent = state.freeSpins;
            $('#profileGames').textContent = state.totalGames;
            $('#profileWins').textContent = state.wins;
            $('#profileName').textContent = user.firstName || 'Игрок';
            $('#profileId').textContent = user.id;
            $('#freeSpinCount').textContent = state.freeSpins;
            $('#withdrawAvailable').textContent = state.balance.toFixed(2) + '$';
            $('#withdrawGames').textContent = state.gamesSinceWithdrawal;

            try {
                if (state.selectedBet) localStorage.setItem('lastBet', state.selectedBet);
                localStorage.setItem('lastBetAmount', $('#betAmount') ? $('#betAmount').value : '');
            } catch (e) {}
        }

        // ═══════════════════════════════════════
        // КОЛЕСО РУЛЕТКИ
        // ═══════════════════════════════════════
        const rNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];

        function buildRouletteRing() {
            const ring = $('#rouletteRing');
            if (!ring) return;

            const slices = rNumbers.map(function(num, i) {
                const color = num === 0 ? '#27ae60' : (reds.includes(num) ? '#c0392b' : '#1a1a1a');
                return color + ' ' + (i * (360 / 37)) + 'deg ' + ((i + 1) * (360 / 37)) + 'deg';
            });

            ring.style.background = 'conic-gradient(' + slices.join(',') + ')';
        }

        buildRouletteRing();

        function spinWheel(targetNum) {
            return new Promise(function(resolve) {
                const ring = $('#rouletteRing');
                if (!ring) {
                    resolve();
                    return;
                }

                const idx = rNumbers.indexOf(targetNum);
                const sector = 360 / 37;
                const angle = sector * idx + sector / 2;
                const spins = 5 + Math.floor(Math.random() * 5);

                wheelRotation += spins * 360 + (360 - (wheelRotation % 360)) + angle;
                ring.style.transform = 'rotate(' + wheelRotation + 'deg)';

                playSpinSound();
                setTimeout(resolve, 5000);
            });
        }

        // ═══════════════════════════════════════
        // ТАБЫ
        // ═══════════════════════════════════════
        $$('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                $$('.tab-btn').forEach(function(x) { x.classList.remove('active'); });
                this.classList.add('active');

                $$('.tab-content').forEach(function(x) { x.classList.remove('active'); });

                const tab = $('#tab-' + this.dataset.tab);
                if (tab) tab.classList.add('active');

                if (this.dataset.tab === 'profile') {
                    loadUser();
                }

                vibrate();
            });
        });

        // ═══════════════════════════════════════
        // ВЫБОР СТАВКИ
        // ═══════════════════════════════════════
        $$('#betGrid .bet-option').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (state.isSpinning) return;

                $$('#betGrid .bet-option').forEach(function(x) {
                    x.classList.remove('selected', 'red-sel', 'black-sel');
                });

                this.classList.add('selected');

                if (this.dataset.bet === 'red') this.classList.add('red-sel');
                if (this.dataset.bet === 'black') this.classList.add('black-sel');

                if (this.dataset.bet !== 'number') {
                    state.selectedBet = this.dataset.bet;
                    const numInput = $('#numberBetInput');
                    if (numInput) numInput.style.display = 'none';
                }

                vibrate();
            });
        });

        $$('[data-quick]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const betAmount = $('#betAmount');
                if (betAmount) betAmount.value = this.dataset.quick;
                vibrate();
            });
        });

        const freeSpinToggle = $('#freeSpinToggle');
        if (freeSpinToggle) {
            freeSpinToggle.addEventListener('click', function() {
                if (state.freeSpins <= 0) {
                    toast('Нет бесплатных спинов');
                    return;
                }
                this.classList.toggle('checked');
                vibrate();
            });
        }

        const numberBetBtn = $('#numberBetBtn');
        const numberBetInput = $('#numberBetInput');

        if (numberBetBtn) {
            numberBetBtn.addEventListener('click', function() {
                if (!numberBetInput) return;

                if (numberBetInput.style.display === 'none') {
                    numberBetInput.style.display = 'block';
                    numberBetInput.focus();
                    this.classList.add('selected');
                    state.selectedBet = String(numberBetInput.value || 17);
                } else {
                    numberBetInput.style.display = 'none';
                    this.classList.remove('selected');
                    state.selectedBet = null;
                }
            });
        }

        if (numberBetInput) {
            numberBetInput.addEventListener('input', function() {
                const val = parseInt(this.value);
                if (val >= 0 && val <= 36) {
                    state.selectedBet = String(val);
                    $$('#betGrid .bet-option').forEach(function(x) {
                        x.classList.remove('selected', 'red-sel', 'black-sel');
                    });
                    if (numberBetBtn) numberBetBtn.classList.add('selected');
                }
            });
        }

        // ═══════════════════════════════════════
        // ИГРА (ОДИНОЧНАЯ РУЛЕТКА)
        // ═══════════════════════════════════════
        const wheelClickArea = $('#wheelClickArea');

        if (wheelClickArea) {
            wheelClickArea.addEventListener('click', async function() {
                // Защита от двойного клика
                if (state.isSpinning) return;
                state.isSpinning = true;

                // Проверка ставки
                if (!state.selectedBet) {
                    showCenterBanner('❌ Сделайте ставку!', 'lose');
                    state.isSpinning = false;
                    return;
                }

                const useFree = freeSpinToggle ? freeSpinToggle.classList.contains('checked') : false;
                const betAmountInput = $('#betAmount');
                const amount = parseFloat(betAmountInput ? betAmountInput.value : 0) || 0;

                if (!useFree && amount <= 0) {
                    toast('Введите сумму ставки');
                    state.isSpinning = false;
                    return;
                }

                if (!useFree && amount > state.balance) {
                    toast('Недостаточно средств');
                    state.isSpinning = false;
                    return;
                }

                if (useFree && state.freeSpins <= 0) {
                    toast('Нет бесплатных спинов');
                    state.isSpinning = false;
                    return;
                }

                // Визуальные эффекты
                const ball = $('#rouletteBall');
                if (ball) ball.classList.remove('stopped');
                vibrate(30);

                try {
                    console.log('Sending game_result request...');

                    const result = await api('/api/game_result', {
                        bet_type: state.selectedBet,
                        bet_amount: amount,
                        use_free_spin: useFree
                    });

                    console.log('Game result:', result);

                    // Перерисовываем колесо
                    buildRouletteRing();

                    // Запускаем анимацию
                    await spinWheel(result.number);

                    // Обновляем состояние
                    state.balance = result.new_balance;
                    state.freeSpins = result.free_spins;
                    state.totalGames = result.games_played;
                    state.gamesSinceWithdrawal = result.games_since_withdrawal;
                    if (result.is_win) state.wins++;

                    updateUI();

                    // Показываем результат
                    const resultNum = $('#resultNum');
                    const resultText = $('#resultText');
                    const balanceCard = $('#balanceCard');

                    if (result.is_win) {
                        showCenterBanner('🎉 +' + result.win_amount.toFixed(2) + '$', 'win');
                        spawnConfetti();
                        playWinSound();
                    } else {
                        showCenterBanner('😞 -' + amount.toFixed(2) + '$', 'lose');
                        playLoseSound();
                    }

                    const colorNames = { red: 'КРАСНОЕ', black: 'ЧЁРНОЕ', green: 'ZERO' };

                    if (resultNum) {
                        resultNum.textContent = result.number;
                        resultNum.style.color = result.color === 'red' ? '#ff4444' :
                            (result.color === 'green' ? '#ffd700' : '#e8e8e8');
                    }

                    if (resultText) {
                        resultText.innerHTML = 'Выпало: <span style="font-weight:700;">' +
                            result.number + ' ' + (colorNames[result.color] || '') + '</span>';
                    }

                    if (balanceCard) {
                        balanceCard.classList.add('wave');
                        setTimeout(function() {
                            if (balanceCard) balanceCard.classList.remove('wave');
                        }, 600);
                    }

                } catch (e) {
                    console.error('Game error:', e);
                    toast('Ошибка игры: ' + e.message);
                    loadUser();
                } finally {
                    state.isSpinning = false;
                    if (freeSpinToggle) freeSpinToggle.classList.remove('checked');
                    if (ball) ball.classList.add('stopped');
                }
            });
        }

        // ═══════════════════════════════════════
        // ДЕПОЗИТ
        // ═══════════════════════════════════════
        function showDeposit() {
            $('#depositModal').classList.add('active');
            $('#depositAmount').value = 10;
            $('#depositStatus').textContent = '';

            if (paymentCheckInterval) {
                clearInterval(paymentCheckInterval);
                paymentCheckInterval = null;
            }
        }

        $('#depositCloseBtn').addEventListener('click', function() {
            $('#depositModal').classList.remove('active');
            if (paymentCheckInterval) {
                clearInterval(paymentCheckInterval);
                paymentCheckInterval = null;
            }
        });

        $('#depositConfirmBtn').addEventListener('click', async function() {
            const amount = parseFloat($('#depositAmount').value) || 0;

            if (amount <= 0) {
                toast('Введите сумму');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = '⏳';

            try {
                const result = await api('/api/create_invoice', { amount: amount });

                if (result.success) {
                    pendingPaymentId = result.payment_id;
                    $('#depositStatus').textContent = '⏳ Ожидание оплаты...';

                    if (tg) {
                        tg.openLink(result.invoice_url);
                    } else {
                        window.open(result.invoice_url, '_blank');
                    }

                    if (paymentCheckInterval) clearInterval(paymentCheckInterval);

                    paymentCheckInterval = setInterval(async function() {
                        if (!pendingPaymentId) {
                            clearInterval(paymentCheckInterval);
                            paymentCheckInterval = null;
                            return;
                        }

                        try {
                            const check = await api('/api/check_payment', { payment_id: pendingPaymentId });

                            if (check.success && check.status === 'paid') {
                                state.balance = check.new_balance;
                                updateUI();

                                $('#balanceDisplay').textContent = check.new_balance.toFixed(2) + '$';
                                $('#balanceCard').classList.add('wave');
                                setTimeout(function() {
                                    $('#balanceCard').classList.remove('wave');
                                }, 600);

                                $('#depositStatus').textContent = '✅ Оплачено! +' + check.amount + '$';

                                pendingPaymentId = null;
                                clearInterval(paymentCheckInterval);
                                paymentCheckInterval = null;

                                btn.textContent = 'Оплатить';
                                btn.disabled = false;

                                setTimeout(function() {
                                    $('#depositModal').classList.remove('active');
                                }, 2000);
                            }
                        } catch (e) {
                            console.error('Payment check error:', e);
                        }
                    }, 5000);

                    btn.textContent = 'Оплатить (ожидание)';
                } else {
                    $('#depositStatus').textContent = '❌ ' + (result.error || 'Ошибка');
                    btn.disabled = false;
                    btn.textContent = 'Оплатить';
                }
            } catch (e) {
                $('#depositStatus').textContent = '❌ Ошибка соединения';
                btn.disabled = false;
                btn.textContent = 'Оплатить';
            }
        });

        $('#profileDepositBtn').addEventListener('click', showDeposit);

        // ═══════════════════════════════════════
        // ВЫВОД
        // ═══════════════════════════════════════
        function showWithdraw() {
            if (state.gamesSinceWithdrawal < 2) {
                toast('Сыграйте минимум 2 игры для вывода');
                return;
            }

            if (state.balance <= 0) {
                toast('Нет средств для вывода');
                return;
            }

            updateUI();
            $('#withdrawModal').classList.add('active');
        }

        $('#withdrawCloseBtn').addEventListener('click', function() {
            $('#withdrawModal').classList.remove('active');
        });

        $('#withdrawConfirmBtn').addEventListener('click', async function() {
            const amount = parseFloat($('#withdrawAmount').value) || 0;
            const wallet = ($('#withdrawWallet').value || '').trim();

            if (amount <= 0) {
                toast('Введите сумму');
                return;
            }

            if (!wallet) {
                toast('Введите USDT адрес или @username');
                return;
            }

            if (amount > state.balance) {
                toast('Недостаточно средств');
                return;
            }

            try {
                const result = await api('/api/withdraw', {
                    amount: amount,
                    wallet: wallet
                });

                if (result.success) {
                    state.balance = result.new_balance;
                    updateUI();
                    $('#withdrawModal').classList.remove('active');
                    toast('✅ Заявка на вывод отправлена!');
                } else {
                    toast('❌ ' + (result.error || 'Ошибка'));
                }
            } catch (e) {
                console.error('Withdraw error:', e);
            }
        });

        $('#profileWithdrawBtn').addEventListener('click', showWithdraw);

        // ═══════════════════════════════════════
        // ЗАКРЫТИЕ МОДАЛОК
        // ═══════════════════════════════════════
        document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    if (paymentCheckInterval && overlay.id === 'depositModal') {
                        clearInterval(paymentCheckInterval);
                        paymentCheckInterval = null;
                    }
                }
            });
        });

        // ═══════════════════════════════════════
        // ЗАПУСК
        // ═══════════════════════════════════════
        try {
            const savedBet = localStorage.getItem('lastBet');
            const savedAmount = localStorage.getItem('lastBetAmount');

            if (savedBet) {
                state.selectedBet = savedBet;
                const btn = document.querySelector('.bet-option[data-bet="' + savedBet + '"]');
                if (btn) {
                    btn.classList.add('selected');
                    if (savedBet === 'red') btn.classList.add('red-sel');
                    if (savedBet === 'black') btn.classList.add('black-sel');
                }
            }

            if (savedAmount && $('#betAmount')) {
                $('#betAmount').value = savedAmount;
            }
        } catch (e) {}

        loadUser();

        window.addEventListener('beforeunload', function() {
            if (paymentCheckInterval) clearInterval(paymentCheckInterval);
        });

        try {
            if (!localStorage.getItem('welcomeShown')) {
                localStorage.setItem('welcomeShown', '1');
                setTimeout(function() {
                    showCenterBanner(
                        '👋 Добро пожаловать!<br><span style="font-size:14px;">Выберите ставку и нажмите на колесо</span>',
                        'win'
                    );
                }, 1000);
            }
        } catch (e) {}
    </script>
</body>
</html>
