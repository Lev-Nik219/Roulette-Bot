<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1a0a">
    <title>🎡 ROULETTE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        @keyframes bgPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes popIn{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
        @keyframes neonPulse{0%,100%{text-shadow:0 0 10px #ffd700,0 0 30px #f7971e}50%{text-shadow:0 0 20px #ffd700,0 0 60px #f7971e,0 0 80px #e65100}}
        @keyframes balanceWave{0%{transform:scale(1)}30%{transform:scale(1.1)}60%{transform:scale(0.95)}100%{transform:scale(1)}}
        @keyframes bannerIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5) rotate(-10deg)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(2deg)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}
        @keyframes bannerOut{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.5) rotate(10deg)}}
        @keyframes tabSlideIn{0%{opacity:0;transform:translateY(40px) scale(0.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes confetti{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(-400px) rotate(720deg) scale(0);opacity:0}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes wheelGlow{0%,100%{box-shadow:0 0 30px rgba(247,151,30,0.3)}50%{box-shadow:0 0 50px rgba(247,151,30,0.5)}}

        body{
            background:linear-gradient(135deg,#0a1a0a,#0d1f0d 30%,#0a1a0a 60%,#0d1f0d 100%);
            background-size:400% 400%;
            animation:bgPulse 15s ease infinite;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow-x:hidden;
            touch-action:pan-y
        }
        body::before{
            content:'';
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:radial-gradient(ellipse at 30% 20%,rgba(76,175,80,0.06) 0%,transparent 60%),
                       radial-gradient(ellipse at 70% 60%,rgba(247,151,30,0.05) 0%,transparent 50%);
            pointer-events:none;z-index:0
        }

        #particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

        .app-container{width:100%;max-width:500px;margin:0 auto;padding:16px;min-height:100vh;position:relative;z-index:1}

        .header{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.02);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);border-radius:24px;padding:16px 20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 40px rgba(0,0,0,0.5)}
        .balance{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.5);padding:10px 18px;border-radius:30px;border:1px solid rgba(255,255,255,0.05);transition:all 0.4s}
        .balance.wave{animation:balanceWave 0.6s cubic-bezier(0.4,0,0.2,1)}
        .balance-icon{font-size:22px;animation:float 3s ease-in-out infinite}
        .balance-amount{font-size:22px;font-weight:800;background:linear-gradient(180deg,#ffd700,#4CAF50);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}

        .tab-nav{display:flex;gap:8px;margin-bottom:16px;background:rgba(255,255,255,0.02);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:20px;padding:6px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
        .tab-btn{flex:1;padding:12px;border:none;background:transparent;color:rgba(255,255,255,0.45);border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.4s;position:relative}
        .tab-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);width:60%;height:3px;background:linear-gradient(90deg,#4CAF50,#ffd200);border-radius:3px;transition:transform 0.4s}
        .tab-btn.active::after{transform:translateX(-50%) scaleX(1)}
        .tab-btn.active{background:linear-gradient(180deg,rgba(76,175,80,0.2),rgba(247,151,30,0.12));color:white}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:tabSlideIn 0.5s ease}

        .game-area{background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;padding:20px;margin-bottom:16px;text-align:center;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 40px rgba(0,0,0,0.5)}

        /* WHEEL */
        .roulette-wheel-container{position:relative;width:280px;height:280px;margin:20px auto;cursor:pointer;animation:wheelGlow 2s ease-in-out infinite}
        .roulette-wheel-container:active{transform:scale(0.98)}
        .roulette-outer{width:280px;height:280px;border-radius:50%;border:6px solid #3a2a10;background:#1a0f00;box-shadow:0 0 40px rgba(0,0,0,0.6),inset 0 0 30px rgba(0,0,0,0.4);position:relative;overflow:hidden}
        .roulette-ring{position:absolute;top:10px;left:10px;right:10px;bottom:10px;border-radius:50%;transition:transform 5s cubic-bezier(0.17,0.89,0.32,1.25);
            background:conic-gradient(from 0deg,
                #1a6b1a 0deg 9.73deg,#1a1a1a 9.73deg 19.46deg,#1a6b1a 19.46deg 29.19deg,#1a1a1a 29.19deg 38.92deg,
                #1a6b1a 38.92deg 48.65deg,#1a1a1a 48.65deg 58.38deg,#1a6b1a 58.38deg 68.11deg,#1a1a1a 68.11deg 77.84deg,
                #1a6b1a 77.84deg 87.57deg,#1a1a1a 87.57deg 97.30deg,#1a6b1a 97.30deg 107.03deg,#1a1a1a 107.03deg 116.76deg,
                #1a6b1a 116.76deg 126.49deg,#1a1a1a 126.49deg 136.22deg,#1a6b1a 136.22deg 145.95deg,#1a1a1a 145.95deg 155.68deg,
                #1a6b1a 155.68deg 165.41deg,#1a1a1a 165.41deg 175.14deg,#1a6b1a 175.14deg 184.87deg,#1a1a1a 184.87deg 194.60deg,
                #ffd700 194.60deg 204.33deg,
                #1a1a1a 204.33deg 214.06deg,#1a6b1a 214.06deg 223.79deg,#1a1a1a 223.79deg 233.52deg,
                #1a6b1a 233.52deg 243.25deg,#1a1a1a 243.25deg 252.98deg,#1a6b1a 252.98deg 262.71deg,
                #1a1a1a 262.71deg 272.44deg,#1a6b1a 272.44deg 282.17deg,#1a1a1a 282.17deg 291.90deg,
                #1a6b1a 291.90deg 301.63deg,#1a1a1a 301.63deg 311.36deg,#1a6b1a 311.36deg 321.09deg,
                #1a1a1a 321.09deg 330.82deg,#1a6b1a 330.82deg 340.55deg,#1a1a1a 340.55deg 350.28deg,
                #1a6b1a 350.28deg 360deg);
            z-index:1}
        .roulette-ball{position:absolute;width:14px;height:14px;background:radial-gradient(circle at 40% 40%,#fff,#ccc);border-radius:50%;top:50%;left:50%;margin-left:-7px;margin-top:-124px;box-shadow:0 0 12px rgba(255,255,255,0.8);transition:all 5s cubic-bezier(0.17,0.89,0.32,1.25);z-index:5}
        .roulette-center{position:absolute;top:50%;left:50%;width:40px;height:40px;margin-left:-20px;margin-top:-20px;background:radial-gradient(circle,#8d6e63,#5d4037);border-radius:50%;border:3px solid #3e2723;z-index:4}
        .roulette-result-num{font-size:44px;font-weight:800;min-height:55px;margin:6px 0}

        /* BETS */
        .bet-buttons{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:16px 0}
        .bet-option{background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.1);color:white;padding:10px 14px;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s;min-width:70px}
        .bet-option:active{transform:scale(0.94)}
        .bet-option.selected{background:linear-gradient(180deg,#4CAF50,#2E7D32);color:white;font-weight:800;box-shadow:0 6px 20px rgba(76,175,80,0.5);border-color:#4CAF50}
        .bet-option.red-sel{background:linear-gradient(180deg,#1a6b1a,#0d3d0d)!important;box-shadow:0 6px 20px rgba(76,175,80,0.4)!important;border-color:#4CAF50!important}
        .bet-option.black-sel{background:linear-gradient(180deg,#333,#000)!important;box-shadow:0 6px 20px rgba(255,255,255,0.2)!important;border-color:#888!important}

        input[type="number"]{width:100%;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:white;font-size:16px;margin-bottom:10px;outline:none;text-align:center}
        input:focus{border-color:#4CAF50;box-shadow:0 0 20px rgba(76,175,80,0.2)}

        .free-spin-card{background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);border-radius:16px;padding:12px 16px;margin:10px 0;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.3s}
        .free-spin-card.checked{background:rgba(76,175,80,0.15);border-color:rgba(76,175,80,0.5);box-shadow:0 0 20px rgba(76,175,80,0.3)}
        .free-spin-badge{background:#4CAF50;color:white;font-size:12px;font-weight:700;padding:4px 12px;border-radius:12px;margin-left:auto}

        .confetti{position:fixed;pointer-events:none;z-index:250;animation:confetti 2s ease-out forwards}

        .center-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(180deg,rgba(0,0,0,0.95),rgba(15,25,15,0.95));padding:24px 36px;border-radius:24px;z-index:200;text-align:center;font-weight:800;font-size:24px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 30px 80px rgba(0,0,0,0.8);pointer-events:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
        .center-banner.show{animation:bannerIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards}
        .center-banner.hide{animation:bannerOut 0.4s ease forwards}
        .center-banner.win{color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.6)}
        .center-banner.lose{color:#ff6b6b}

        /* MULTIPLAYER */
        .room-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.3s}
        .room-card:hover{border-color:rgba(76,175,80,0.4);box-shadow:0 8px 30px rgba(0,0,0,0.4)}
        .room-header{display:flex;justify-content:space-between;align-items:center}
        .room-id{font-weight:700;color:#ffd700}
        .room-bank{color:#4CAF50;font-weight:600;font-size:14px}
        .room-timer{color:#f7971e;font-size:12px}
        .player-badge{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:14px;font-size:11px;font-weight:600;margin:3px;color:white}
        .player-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

        .action-btn{width:100%;padding:14px;border:none;border-radius:18px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:all 0.3s;color:white}
        .action-btn.gold{background:linear-gradient(180deg,#f7971e,#e65100);box-shadow:0 6px 20px rgba(247,151,30,0.4)}
        .action-btn.ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
        .action-btn:active{transform:scale(0.96)}

        .hidden{display:none!important}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:12px 24px;color:white;font-weight:600;font-size:13px;z-index:300}
        .loading-spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,0.1);border-top-color:#ffd700;border-radius:50%;animation:spin 0.7s linear infinite;margin:16px auto}

        @media(max-width:380px){
            .roulette-wheel-container{width:230px;height:230px}
            .roulette-outer{width:230px;height:230px}
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="app-container">
        <div class="header">
            <div>
                <div style="font-size:18px;font-weight:800;">🎡 ROULETTE</div>
                <div style="font-size:12px;opacity:0.5;">European Casino</div>
            </div>
            <div class="balance" id="balanceCard">
                <span class="balance-icon">💰</span>
                <span class="balance-amount" id="balanceDisplay">0.00$</span>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="single">🎡 Рулетка</button>
            <button class="tab-btn" data-tab="multiplayer">👥 Мультиплеер</button>
        </div>

        <!-- SINGLE GAME -->
        <div class="tab-content active" id="tab-single">
            <div class="game-area">
                <div class="roulette-wheel-container" id="wheelClickArea">
                    <div class="roulette-outer">
                        <div class="roulette-ring" id="rouletteRing"></div>
                        <div class="roulette-ball" id="rouletteBall"></div>
                        <div class="roulette-center"></div>
                    </div>
                </div>
                <div class="roulette-result-num" id="resultNum">🎯</div>
                <div style="font-size:13px;opacity:0.6;" id="resultText">Выберите ставку и нажмите на колесо</div>
            </div>

            <div class="game-area">
                <div style="font-size:12px;opacity:0.5;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">Выберите ставку</div>
                <div class="bet-buttons" id="betGrid">
                    <button class="bet-option" data-bet="red">🟢 Зелёное ×2</button>
                    <button class="bet-option" data-bet="black">⚫ Чёрное ×2</button>
                    <button class="bet-option" data-bet="even">🔵 Чёт ×2</button>
                    <button class="bet-option" data-bet="odd">🟣 Нечет ×2</button>
                    <button class="bet-option" data-bet="zero">🟡 ZERO ×36</button>
                </div>

                <input type="number" id="betAmount" value="1" min="0.1" step="0.1" placeholder="Сумма ставки">

                <div style="display:flex;gap:5px;margin-bottom:8px;">
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="0.5">0.5$</button>
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="1">1$</button>
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="5">5$</button>
                    <button class="bet-option" style="flex:1;font-size:11px;" data-quick="10">10$</button>
                </div>

                <div class="free-spin-card" id="freeSpinToggle">
                    <span>🎁 Бесплатный спин</span>
                    <span class="free-spin-badge" id="freeSpinCount">0</span>
                </div>
            </div>
        </div>

        <!-- MULTIPLAYER -->
        <div class="tab-content" id="tab-multiplayer">
            <div class="game-area">
                <div style="font-size:20px;font-weight:800;margin-bottom:10px;">👥 МУЛЬТИПЛЕЕР</div>
                <input type="number" id="mpBetAmount" value="1" min="0.1" step="0.1" placeholder="Ставка">
                <button class="action-btn gold" id="createRoomBtn">🎯 СОЗДАТЬ КОМНАТУ</button>
                <div style="margin-top:16px;font-size:12px;opacity:0.5;text-transform:uppercase;letter-spacing:2px;">Активные комнаты</div>
                <div id="roomsList"><div class="loading-spinner"></div></div>
                <button class="action-btn ghost" id="refreshRoomsBtn" style="margin-top:8px;">🔄 Обновить</button>
            </div>

            <div class="game-area hidden" id="myRoomPanel">
                <div style="font-weight:700;color:#ffd700;">КОМНАТА #<span id="myRoomId">---</span></div>
                <div style="font-size:12px;opacity:0.6;">Банк: <span style="color:#4CAF50;" id="myRoomBank">0$</span></div>
                <div style="font-size:12px;color:#f7971e;">⏱ <span id="myRoomTimer">30</span>с</div>
                <div class="player-list" id="myRoomPlayers"></div>
                <button class="action-btn gold hidden" id="startGameBtn">🚀 ЗАПУСТИТЬ</button>
                <button class="action-btn ghost" id="leaveRoomBtn" style="color:#ff6b6b;">🚪 Выйти</button>
            </div>
        </div>

        <div class="center-banner" id="centerBanner"></div>
    </div>

    <script>
        // ═══════════════════════════════════════
        const tg = window.Telegram?.WebApp;
        let user = { id: 1167503795, username: 'player', firstName: 'Player' };

        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.initDataUnsafe?.user) {
                user.id = tg.initDataUnsafe.user.id;
                user.username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || 'Player';
                user.firstName = tg.initDataUnsafe.user.first_name || 'Player';
            }
        }

        const API = 'https://roulette-bot-8i8t.onrender.com';
        const WS_URL = API.replace('https','wss').replace('http','ws');

        let state = { balance:0, freeSpins:0, totalGames:0, totalWins:0, gamesSinceWithdrawal:0, selectedBet:null, isSpinning:false, mode:'single', currentRoom:null, isCreator:false };
        let ws = null, wheelRotation = 0;

        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);

        // Particles
        const canvas = $('#particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random()*canvas.width; this.y = canvas.height+10;
                this.size = 1+Math.random()*2.5; this.speed = 0.2+Math.random()*0.8;
                this.opacity = 0.1+Math.random()*0.3;
                this.color = Math.random()<0.5?'#ffd700':(Math.random()<0.5?'#4CAF50':'#f7971e');
                this.wobble = Math.random()*Math.PI*2;
            }
            update() { this.y-=this.speed; this.x+=Math.sin(this.wobble)*0.2; this.wobble+=0.02; if(this.y<-10)this.reset(); }
            draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=this.color; ctx.globalAlpha=this.opacity; ctx.fill(); ctx.globalAlpha=1; }
        }
        for(let i=0;i<50;i++){const p=new Particle();p.y=Math.random()*canvas.height;particles.push(p);}
        function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animateParticles);}
        animateParticles();

        // Audio
        function playSpinSound(){try{const a=new(window.AudioContext||window.webkitAudioContext)(),d=5,s=a.sampleRate,b=a.createBuffer(1,d*s,s),c=b.getChannelData(0);for(let i=0;i<c.length;i++){const t=i/s,p=t/d;c[i]=(Math.random()*2-1)*0.015*(1-p*0.7)*(0.3+0.7*Math.sin(2*Math.PI*(6+p*40)*t))}const src=a.createBufferSource();src.buffer=b;const flt=a.createBiquadFilter();flt.type='bandpass';flt.frequency.value=500;const g=a.createGain();g.gain.setValueAtTime(0.04,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);src.connect(flt);flt.connect(g);g.connect(a.destination);src.start();src.stop(a.currentTime+d)}catch(e){}}
        function playWinSound(){try{const a=new(window.AudioContext||window.webkitAudioContext)();[784,988,1175].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;const t=a.currentTime+i*0.15;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.06,t+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.35)})}catch(e){}}
        function playLoseSound(){try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(220,a.currentTime);o.frequency.linearRampToValueAtTime(140,a.currentTime+0.4);g.gain.setValueAtTime(0.03,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.4)}catch(e){}}
        function spawnConfetti(){const c=['#ffd700','#ff6b6b','#4CAF50','#f7971e'];for(let i=0;i<30;i++){const e=document.createElement('div');e.className='confetti';e.style.left=`${35+Math.random()*30}%`;e.style.top=`${45+Math.random()*15}%`;e.style.width=`${5+Math.random()*7}px`;e.style.height=`${5+Math.random()*7}px`;e.style.backgroundColor=c[Math.floor(Math.random()*c.length)];e.style.borderRadius=Math.random()>0.5?'50%':'2px';e.style.animationDuration=`${1.5+Math.random()*1.5}s`;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}}

        // API
        async function api(endpoint,data={}){
            try{const r=await fetch(`${API}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:user.id,...data})});
            if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`HTTP ${r.status}`);}
            return await r.json()}catch(e){toast(`Ошибка: ${e.message}`);throw e}
        }

        async function loadUser(){
            try{const d=await api('/api/user/get');state.balance=d.balance||0;state.freeSpins=d.free_spins||0;state.totalWins=d.total_wins||0;state.totalGames=d.total_games||0;state.gamesSinceWithdrawal=d.games_since_withdrawal||0;updateUI()}catch(e){}
        }

        function updateUI(){
            $('#balanceDisplay').textContent=`${state.balance.toFixed(2)}$`;
            $('#freeSpinCount').textContent=state.freeSpins;
        }

        function toast(msg){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},2000)}
        function vibrate(ms=12){if(navigator.vibrate)navigator.vibrate(ms)}

        // Tabs
        $$('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{$$('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');$$('.tab-content').forEach(x=>x.classList.remove('active'));const t=$(`#tab-${b.dataset.tab}`);if(t)t.classList.add('active');state.mode=b.dataset.tab;if(b.dataset.tab==='multiplayer'){connectWS();setTimeout(()=>sendWS({action:'get_rooms'}),500)}vibrate()})});

        // Bet selection
        $$('#betGrid .bet-option').forEach(b=>{b.addEventListener('click',()=>{if(state.isSpinning)return;$$('#betGrid .bet-option').forEach(x=>{x.classList.remove('selected','red-sel','black-sel')});b.classList.add('selected');if(b.dataset.bet==='red')b.classList.add('red-sel');if(b.dataset.bet==='black')b.classList.add('black-sel');state.selectedBet=b.dataset.bet;vibrate()})});
        $$('[data-quick]').forEach(b=>{b.addEventListener('click',()=>{$('#betAmount').value=b.dataset.quick;vibrate()})});
        $('#freeSpinToggle').addEventListener('click',function(){if(state.freeSpins<=0){toast('Нет бесплатных спинов');return}this.classList.toggle('checked');vibrate()});

        // Spin on wheel click
        $('#wheelClickArea').addEventListener('click',async()=>{
            if(state.isSpinning)return;
            if(!state.selectedBet){toast('Выберите ставку!');return}
            const useFree=$('#freeSpinToggle').classList.contains('checked');
            const amount=parseFloat($('#betAmount').value)||0;
            if(!useFree&&amount<=0){toast('Введите сумму!');return}
            if(!useFree&&amount>state.balance){toast('Недостаточно средств!');return}
            if(useFree&&state.freeSpins<=0){toast('Нет бесплатных спинов!');return}
            state.isSpinning=true;
            $('#wheelClickArea').style.opacity='0.85';
            vibrate(30);
            try{
                const result=await api('/api/game/place_bet',{bet_type:state.selectedBet,bet_amount:amount,use_free_spin:useFree});
                await spinWheel(result.number);
                state.balance=result.new_balance;
                state.freeSpins=result.free_spins;
                state.totalGames=result.games_played||(state.totalGames+1);
                if(result.is_win)state.totalWins++;
                state.gamesSinceWithdrawal=state.totalGames;
                updateUI();
                showBanner(result);
                $('#balanceCard').classList.add('wave');
                setTimeout(()=>$('#balanceCard').classList.remove('wave'),600);
            }catch(e){toast('Ошибка игры');loadUser()}
            finally{
                state.isSpinning=false;
                $('#wheelClickArea').style.opacity='1';
                $('#freeSpinToggle').classList.remove('checked');
            }
        });

        function spinWheel(targetNum){
            return new Promise(resolve=>{
                const ring=$('#rouletteRing');
                const numbers=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
                const sector=360/37;
                const idx=numbers.indexOf(targetNum);
                const angle=sector*idx+sector/2;
                const spins=5+Math.floor(Math.random()*5);
                wheelRotation+=spins*360+(360-wheelRotation%360)+angle;
                ring.style.transform=`rotate(${wheelRotation}deg)`;
                playSpinSound();
                setTimeout(resolve,5000);
            });
        }

        function showBanner(result){
            const b=$('#centerBanner');
            b.classList.remove('win','lose','show','hide');
            void b.offsetWidth;
            if(result.is_win){
                b.innerHTML=`🎉<br>+${result.win_amount.toFixed(2)}$<br><span style="font-size:14px;">ПОБЕДА!</span>`;
                b.classList.add('win');spawnConfetti();playWinSound();
            }else{
                b.innerHTML=`😢<br>-${$('#betAmount').value||'0'}$<br><span style="font-size:14px;">Проигрыш</span>`;
                b.classList.add('lose');playLoseSound();
            }
            b.classList.add('show');
            const cn={red:'ЗЕЛЁНОЕ',black:'ЧЁРНОЕ',green:'ZERO'};
            $('#resultNum').textContent=result.number;
            $('#resultNum').style.color=result.color==='red'?'#4CAF50':result.color==='green'?'#ffd700':'#e8e8e8';
            $('#resultText').innerHTML=`Выпало: <span style="font-weight:700;">${result.number} ${cn[result.color]||''}</span>`;
            setTimeout(()=>{b.classList.add('hide');b.classList.remove('show')},2500);
        }

        // WebSocket
        function connectWS(){
            if(ws&&ws.readyState===WebSocket.OPEN)return;
            try{
                ws=new WebSocket(`${WS_URL}/ws`);
                ws.onopen=()=>{ws.send(JSON.stringify({action:'connect',user_id:user.id}));ws.send(JSON.stringify({action:'get_rooms'}))};
                ws.onmessage=e=>{try{handleWS(JSON.parse(e.data))}catch(ex){}};
                ws.onclose=()=>setTimeout(connectWS,3000);
            }catch(e){}
        }

        function sendWS(data){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(data));else{toast('Нет соединения');connectWS()}}

        function handleWS(data){
            switch(data.type){
                case 'rooms_list':renderRooms(data.rooms||[]);break;
                case 'room_created':state.currentRoom=data.room_id;state.isCreator=true;showMyRoom(data);break;
                case 'joined_room':state.currentRoom=data.room_id;state.isCreator=false;showMyRoom(data);break;
                case 'player_joined':case 'player_left':updateRoom(data);break;
                case 'left_room':hideMyRoom();break;
                case 'timer_update':$('#myRoomTimer').textContent=data.time_left;break;
                case 'game_starting':toast('🎰 Игра началась!');$('#startGameBtn').classList.add('hidden');break;
                case 'game_result':showMPResult(data);break;
                case 'game_cancelled':toast('Игра отменена');hideMyRoom();loadUser();break;
                case 'room_closed':hideMyRoom();loadUser();break;
                case 'error':toast(data.message);break;
            }
        }

        function renderRooms(rooms){
            const list=$('#roomsList');list.innerHTML='';
            if(!rooms||!rooms.length){list.innerHTML='<div style="text-align:center;opacity:0.4;padding:16px;">Нет активных комнат</div>';return}
            rooms.forEach(r=>{
                const card=document.createElement('div');card.className='room-card';
                card.innerHTML=`<div class="room-header"><span class="room-id">#${r.room_id}</span><span class="room-timer">⏱ ${r.time_left||0}с</span></div><div style="display:flex;justify-content:space-between;margin-top:6px;"><span>👥 ${r.players_count||0}/6</span><span class="room-bank">💰 ${(r.bank||0).toFixed(2)}$</span></div>`;
                card.addEventListener('click',()=>{
                    if(r.players_count>=6){toast('Комната заполнена');return}
                    const amt=parseFloat($('#mpBetAmount').value)||0;
                    if(amt<=0||amt>state.balance){toast('Неверная сумма');return}
                    sendWS({action:'join_room',user_id:user.id,room_id:r.room_id,bet_amount:amt,avatar:'🎲'});
                    state.balance-=amt;updateUI();
                });
                list.appendChild(card);
            });
        }

        function showMyRoom(data){
            $('#myRoomPanel').classList.remove('hidden');
            $('#myRoomId').textContent=data.room_id;
            $('#myRoomBank').textContent=`${(data.bank||0).toFixed(2)}$`;
            $('#myRoomTimer').textContent=data.timer||30;
            renderPlayers(data.players||[]);
            if(state.isCreator&&data.players&&data.players.length>=2)$('#startGameBtn').classList.remove('hidden');
            else $('#startGameBtn').classList.add('hidden');
            $('#roomsList').innerHTML='';
        }

        function hideMyRoom(){$('#myRoomPanel').classList.add('hidden');$('#startGameBtn').classList.add('hidden');state.currentRoom=null;state.isCreator=false;sendWS({action:'get_rooms'})}
        function updateRoom(data){if(data.players)renderPlayers(data.players);if(data.bank!==undefined)$('#myRoomBank').textContent=`${data.bank.toFixed(2)}$`;if(state.isCreator&&data.players&&data.players.length>=2)$('#startGameBtn').classList.remove('hidden')}
        function renderPlayers(players){$('#myRoomPlayers').innerHTML='';players.forEach(p=>{const b=document.createElement('span');b.className='player-badge';b.style.backgroundColor=p.color||'#555';b.innerHTML=`${p.avatar||'🎲'} ${(p.nickname||'Player').substring(0,15)}`;$('#myRoomPlayers').appendChild(b)})}

        function showMPResult(data){
            const isWin=data.winner_id===user.id;
            const b=$('#centerBanner');b.classList.remove('win','lose','show','hide');void b.offsetWidth;
            if(isWin){b.innerHTML=`🏆<br>+${(data.win_amount||0).toFixed(2)}$`;b.classList.add('win');spawnConfetti();playWinSound()}
            else{b.innerHTML=`😢<br>${data.winner_nickname||'Игрок'}`;b.classList.add('lose');playLoseSound()}
            b.classList.add('show');setTimeout(()=>{b.classList.add('hide');b.classList.remove('show')},3000);
            loadUser();setTimeout(hideMyRoom,4000);
        }

        $('#createRoomBtn').addEventListener('click',()=>{const a=parseFloat($('#mpBetAmount').value)||0;if(a<=0||a>state.balance){toast('Неверная сумма');return}sendWS({action:'create_room',user_id:user.id,bet_amount:a,avatar:'🎯'});state.balance-=a;updateUI()});
        $('#leaveRoomBtn').addEventListener('click',()=>{if(!state.currentRoom)return;sendWS({action:'leave_room',user_id:user.id,room_id:state.currentRoom});hideMyRoom();loadUser()});
        $('#startGameBtn').addEventListener('click',()=>{if(!state.currentRoom||!state.isCreator)return;sendWS({action:'start_game',user_id:user.id,room_id:state.currentRoom})});
        $('#refreshRoomsBtn').addEventListener('click',()=>sendWS({action:'get_rooms'}));

        // Init
        loadUser();
        const urlParams=new URLSearchParams(window.location.search);
        if(urlParams.get('mode')==='multiplayer'){$$('.tab-btn').forEach(x=>x.classList.remove('active'));const m=document.querySelector('.tab-btn[data-tab="multiplayer"]');if(m){m.classList.add('active');$$('.tab-content').forEach(x=>x.classList.remove('active'));const t=$('#tab-multiplayer');if(t)t.classList.add('active');state.mode='multiplayer';connectWS();setTimeout(()=>sendWS({action:'get_rooms'}),500)}}
        setInterval(()=>{if(ws&&ws.readyState===WebSocket.OPEN)sendWS({action:'ping'})},25000);
        window.addEventListener('beforeunload',()=>{if(state.currentRoom)try{sendWS({action:'leave_room',user_id:user.id,room_id:state.currentRoom})}catch(e){};if(ws)ws.close()});
    </script>
</body>
</html>
