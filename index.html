<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1a0a">
    <title>🎡 LN Roulette</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-dark: #0a1a0a;
            --bg-darker: #061206;
            --green-primary: #1a4a1a;
            --green-light: #2d7a2d;
            --gold: #ffd700;
            --gold-dark: #b8960f;
            --red: #e63946;
            --red-dark: #b71c2c;
            --black: #1a1a1a;
            --white: #f0f0f0;
            --glass-bg: rgba(20, 40, 20, 0.6);
            --glass-border: rgba(255, 215, 0, 0.2);
            --glass-blur: blur(15px);
            --neon-green: #00ff41;
            --neon-gold: #ffd700;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --shadow-gold: 0 0 20px rgba(255, 215, 0, 0.3);
            --radius: 20px;
            --radius-sm: 12px;
            --font-main: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── ПАРЯЩИЕ ЧАСТИЦЫ ─── */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* ─── ФОН С ГРАДИЕНТОМ ─── */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(26, 74, 26, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, rgba(0, 255, 65, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── ОСНОВНОЙ КОНТЕЙНЕР ─── */
        .app-container {
            position: relative;
            z-index: 1;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        .header {
            text-align: center;
            padding: 20px 0 10px;
        }

        .header-logo {
            font-size: 42px;
            animation: bounceLogo 2s ease-in-out infinite;
            display: block;
        }

        @keyframes bounceLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header-title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 2px 4px rgba(255, 215, 0, 0.3));
            margin-top: 5px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ─── GLASS PANEL ─── */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-panel-sm {
            padding: 15px;
            margin-bottom: 10px;
        }

        /* ─── БАЛАНС ─── */
        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .balance-item {
            flex: 1;
            min-width: 100px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-sm);
            padding: 12px 10px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .balance-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        .balance-value.free {
            color: var(--neon-green);
            font-size: 16px;
        }

        /* ─── ТАБЫ ─── */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(26, 74, 26, 0.8), rgba(45, 122, 45, 0.6));
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .tab-btn:active {
            transform: scale(0.96);
        }

        /* ─── КОЛЕСО РУЛЕТКИ ─── */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        .wheel-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #2a1a0a;
            box-shadow:
                0 0 30px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.3),
                0 0 60px rgba(255, 215, 0, 0.15);
            overflow: hidden;
        }

        .wheel-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #e63946 0deg 9.73deg, #1a1a1a 9.73deg 19.46deg,
                #e63946 19.46deg 29.19deg, #1a1a1a 29.19deg 38.92deg,
                #e63946 38.92deg 48.65deg, #1a1a1a 48.65deg 58.38deg,
                #e63946 58.38deg 68.11deg, #1a1a1a 68.11deg 77.84deg,
                #e63946 77.84deg 87.57deg, #1a1a1a 87.57deg 97.30deg,
                #e63946 97.30deg 107.03deg, #1a1a1a 107.03deg 116.76deg,
                #e63946 116.76deg 126.49deg, #1a1a1a 126.49deg 136.22deg,
                #e63946 136.22deg 145.95deg, #1a1a1a 145.95deg 155.68deg,
                #e63946 155.68deg 165.41deg, #1a1a1a 165.41deg 175.14deg,
                #e63946 175.14deg 184.87deg, #1a1a1a 184.87deg 194.60deg,
                #00a651 194.60deg 204.33deg,
                #1a1a1a 204.33deg 214.06deg, #e63946 214.06deg 223.79deg,
                #1a1a1a 223.79deg 233.52deg, #e63946 233.52deg 243.25deg,
                #1a1a1a 243.25deg 252.98deg, #e63946 252.98deg 262.71deg,
                #1a1a1a 262.71deg 272.44deg, #e63946 272.44deg 282.17deg,
                #1a1a1a 282.17deg 291.90deg, #e63946 291.90deg 301.63deg,
                #1a1a1a 301.63deg 311.36deg, #e63946 311.36deg 321.09deg,
                #1a1a1a 321.09deg 330.82deg, #e63946 330.82deg 340.55deg,
                #1a1a1a 340.55deg 350.28deg, #e63946 350.28deg 360deg
            );
            transition: transform 5s cubic-bezier(0.25, 0.1, 0.1, 1);
            position: relative;
        }

        .wheel-inner.spinning {
            transition: transform 5s cubic-bezier(0.25, 0.1, 0.1, 1);
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffd700, #b8960f);
            border-radius: 50%;
            border: 4px solid #2a1a0a;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        /* Маркер (указатель) */
        .wheel-marker {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 24px solid #ffd700;
            z-index: 3;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .wheel-number-display {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ─── СТАВКИ ─── */
        .bet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .bet-btn {
            padding: 14px;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .bet-btn:active {
            transform: scale(0.94);
        }

        .bet-btn.red {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            border-color: #ff6b6b;
        }

        .bet-btn.black {
            background: linear-gradient(135deg, #1a1a1a, #333);
            color: white;
            border-color: #555;
        }

        .bet-btn.green {
            background: linear-gradient(135deg, #006837, #00a651);
            color: white;
            border-color: #00ff41;
            grid-column: 1 / -1;
        }

        .bet-btn.even {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            border-color: #5d9cec;
        }

        .bet-btn.odd {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: white;
            border-color: #c39bdb;
        }

        .bet-btn.number {
            background: linear-gradient(135deg, #d4a017, #f0c040);
            color: #1a1a1a;
            border-color: #ffd700;
            grid-column: 1 / -1;
            font-size: 14px;
        }

        .bet-btn.selected {
            border-color: #ffd700 !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3) !important;
            animation: pulseGold 1s ease-in-out infinite;
        }

        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.4); }
        }

        /* ─── ИНПУТ СТАВКИ ─── */
        .bet-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        .bet-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            color: var(--gold);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .bet-input:focus {
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .bet-input::placeholder {
            color: rgba(255, 215, 0, 0.3);
        }

        .quick-bet-btn {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold);
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .quick-bet-btn:active {
            background: rgba(255, 215, 0, 0.3);
        }

        /* ─── КНОПКА СПИНА ─── */
        .spin-btn {
            width: 100%;
            padding: 18px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            background-size: 200% 200%;
            animation: shimmer 2s ease-in-out infinite;
            border: none;
            color: #1a1a1a;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 12px;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
            transition: all 0.2s ease;
        }

        .spin-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ─── БАННЕР РЕЗУЛЬТАТА ─── */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .result-overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-banner {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 30px 25px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-banner.win {
            border-color: rgba(0, 255, 65, 0.6);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3), 0 0 80px rgba(0, 255, 65, 0.1);
        }

        .result-banner.lose {
            border-color: rgba(255, 0, 0, 0.4);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-emoji {
            font-size: 64px;
            animation: bounceResult 0.6s ease;
        }

        @keyframes bounceResult {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .result-number {
            font-size: 48px;
            font-weight: 900;
            margin: 10px 0;
        }

        .result-number.red-num { color: #e63946; }
        .result-number.black-num { color: #f0f0f0; }
        .result-number.green-num { color: #00ff41; }

        .result-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin: 8px 0;
        }

        .result-close-btn {
            margin-top: 15px;
            padding: 12px 30px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        /* ─── МУЛЬТИПЛЕЕР ─── */
        .room-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .room-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-gold);
        }

        .room-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-id {
            font-weight: 700;
            color: var(--gold);
            font-size: 16px;
        }

        .room-players {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .room-bank {
            font-size: 14px;
            color: var(--neon-green);
            font-weight: 600;
        }

        .room-timer {
            font-size: 12px;
            color: #ff8c00;
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .player-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: white;
        }

        .player-avatar {
            font-size: 20px;
        }

        .create-room-btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #2d7a2d, #1a4a1a);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* ─── ЧАТ ПОДДЕРЖКИ ─── */
        .support-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-sm);
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: var(--text-secondary);
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            text-decoration: none;
        }

        /* ─── LOADING ─── */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── ТОСТЫ ─── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            color: var(--text-primary);
            font-weight: 600;
            z-index: 200;
            animation: slideDown 0.3s ease;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ─── ADAPTIVE ─── */
        @media (max-width: 400px) {
            .wheel-container {
                width: 260px;
                height: 260px;
            }
            .header-title {
                font-size: 22px;
            }
            .bet-btn {
                font-size: 14px;
                padding: 10px;
            }
            .spin-btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Парящие частицы -->
    <div class="particles-container" id="particles"></div>

    <!-- Фоновый градиент -->
    <div class="bg-gradient"></div>

    <!-- Основной контейнер -->
    <div class="app-container" id="appContainer">
        <!-- Header -->
        <div class="header">
            <span class="header-logo">🎡</span>
            <h1 class="header-title">LN ROULETTE</h1>
            <p class="header-subtitle">European Casino</p>
        </div>

        <!-- Баланс -->
        <div class="glass-panel glass-panel-sm">
            <div class="balance-row">
                <div class="balance-item">
                    <div class="balance-label">💰 Баланс</div>
                    <div class="balance-value" id="balanceDisplay">0.00$</div>
                </div>
                <div class="balance-item">
                    <div class="balance-label">🎁 Спины</div>
                    <div class="balance-value free" id="freeSpinsDisplay">0</div>
                </div>
                <div class="balance-item">
                    <div class="balance-label">🏆 Побед</div>
                    <div class="balance-value" id="winsDisplay" style="font-size:16px;">0</div>
                </div>
            </div>
        </div>

        <!-- Табы -->
        <div class="tabs" id="modeTabs">
            <button class="tab-btn active" data-mode="single" id="tabSingle">🎡 Одиночная</button>
            <button class="tab-btn" data-mode="multiplayer" id="tabMulti">👥 Мультиплеер</button>
        </div>

        <!-- Контент одиночной игры -->
        <div id="singleGameContent">
            <!-- Колесо -->
            <div class="glass-panel">
                <div class="wheel-container">
                    <div class="wheel-marker"></div>
                    <div class="wheel-outer">
                        <div class="wheel-inner" id="wheelInner"></div>
                    </div>
                    <div class="wheel-center">💎</div>
                </div>
                <div class="wheel-number-display" id="wheelNumberDisplay">
                    Нажмите SPIN для игры
                </div>
            </div>

            <!-- Выбор ставки -->
            <div class="glass-panel">
                <p style="text-align:center;margin-bottom:8px;color:var(--text-secondary);font-size:13px;">
                    ВЫБЕРИТЕ СТАВКУ
                </p>
                <div class="bet-grid" id="betGrid">
                    <button class="bet-btn red" data-bet="red">🔴 КРАСНОЕ ×2</button>

    <!-- Оверлей результата -->
    <div class="result-overlay hidden" id="resultOverlay">
        <div class="result-banner" id="resultBanner">
            <div class="result-emoji" id="resultEmoji"></div>

    </div>
        <script>
        // ═══════════════════════════════════════
        // TELEGRAM WEBAPP INIT
        // ═══════════════════════════════════════
        const tg = window.Telegram?.WebApp;
        let currentUser = null;

        if (tg) {
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();

            // Получаем данные пользователя
            const initData = tg.initDataUnsafe;
            if (initData && initData.user) {
                currentUser = {
                    id: initData.user.id,
                    username: initData.user.username || '',
                    firstName: initData.user.first_name || '',
                    lastName: initData.user.last_name || ''
                };
            }
        }

        // Если нет данных из Telegram — тестовый режим
        if (!currentUser) {
            console.warn('⚠️ Running in test mode (no Telegram WebApp)');
            currentUser = {
                id: 1167503795,
                username: 'test_user',
                firstName: 'Test',
                lastName: 'User'
            };
        }

        // ═══════════════════════════════════════
        // КОНФИГУРАЦИЯ API
        // ═══════════════════════════════════════
        const API_URL = 'https://roulette-bot-xxxx.onrender.com';
        const WS_URL = API_URL.replace('https://', 'wss://').replace('http://', 'ws://');

        // ═══════════════════════════════════════
        // ГЛОБАЛЬНОЕ СОСТОЯНИЕ
        // ═══════════════════════════════════════
        let gameState = {
            balance: 0,
            freeSpins: 0,
            totalWins: 0,
            totalGames: 0,
            selectedBet: null,
            betAmount: 1,
            isSpinning: false,
            mode: 'single', // 'single' | 'multiplayer'
            // Multiplayer
            currentRoom: null,
            rooms: [],
            isCreator: false
        };

        // WebSocket
        let ws = null;
        let wsReconnectTimer = null;

        // ═══════════════════════════════════════
        // DOM ELEMENTS
        // ═══════════════════════════════════════
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const elements = {
            balanceDisplay: $('#balanceDisplay'),
            freeSpinsDisplay: $('#freeSpinsDisplay'),
            winsDisplay: $('#winsDisplay'),
            wheelInner: $('#wheelInner'),
            wheelNumberDisplay: $('#wheelNumberDisplay'),
            betGrid: $('#betGrid'),
            betAmount: $('#betAmount'),
            useFreeSpin: $('#useFreeSpin'),
            spinBtn: $('#spinBtn'),
            resultOverlay: $('#resultOverlay'),
            resultBanner: $('#resultBanner'),
            resultEmoji: $('#resultEmoji'),
            resultNumber: $('#resultNumber'),
            resultAmount: $('#resultAmount'),
            resultMessage: $('#resultMessage'),
            resultCloseBtn: $('#resultCloseBtn'),
            // Tabs
            tabSingle: $('#tabSingle'),
            tabMulti: $('#tabMulti'),
            singleGameContent: $('#singleGameContent'),
            multiplayerGameContent: $('#multiplayerGameContent'),
            // Multiplayer
            roomsList: $('#roomsList'),
            roomsLoading: $('#roomsLoading'),
            noRoomsMsg: $('#noRoomsMsg'),
            mpBetAmount: $('#mpBetAmount'),
            createRoomBtn: $('#createRoomBtn'),
            refreshRoomsBtn: $('#refreshRoomsBtn'),
            myRoomPanel: $('#myRoomPanel'),
            myRoomId: $('#myRoomId'),
            myRoomBank: $('#myRoomBank'),
            myRoomTimer: $('#myRoomTimer'),
            myRoomPlayers: $('#myRoomPlayers'),
            startGameBtn: $('#startGameBtn'),
            leaveRoomBtn: $('#leaveRoomBtn'),
            mpResultPanel: $('#mpResultPanel'),
            mpResultEmoji: $('#mpResultEmoji'),
            mpResultText: $('#mpResultText'),
            mpResultAmount: $('#mpResultAmount')
        };

        // ═══════════════════════════════════════
        // API ФУНКЦИИ
        // ═══════════════════════════════════════

        async function apiCall(endpoint, data = {}) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        ...data
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                console.error(`API Error (${endpoint}):`, error);
                showToast(`Ошибка: ${error.message}`);
                throw error;
            }
        }

        async function fetchUserData() {
            try {
                const data = await apiCall('/api/user/get');
                gameState.balance = data.balance || 0;
                gameState.freeSpins = data.free_spins || 0;
                gameState.totalWins = data.total_wins || 0;
                gameState.totalGames = data.total_games || 0;
                updateBalanceDisplay();
            } catch (error) {
                console.error('Fetch user data error:', error);
            }
        }

        function updateBalanceDisplay() {
            elements.balanceDisplay.textContent = `${gameState.balance.toFixed(2)}$`;
            elements.freeSpinsDisplay.textContent = gameState.freeSpins;
            elements.winsDisplay.textContent = gameState.totalWins;
        }

        // ═══════════════════════════════════════
        // ТОСТЫ
        // ═══════════════════════════════════════

        function showToast(message, duration = 2000) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ═══════════════════════════════════════
        // ВИБРАЦИЯ
        // ═══════════════════════════════════════

        function vibrate(pattern = 15) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        // ═══════════════════════════════════════
        // ПАРЯЩИЕ ЧАСТИЦЫ
        // ═══════════════════════════════════════

        function createParticles() {
            const container = $('#particles');
            const colors = ['#ffd700', '#00ff41', '#ff6b6b', '#4ecdc4', '#ff8c00', '#fff'];
            const shapes = ['circle', 'diamond', 'star'];

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.width = `${2 + Math.random() * 6}px`;
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = `${5 + Math.random() * 15}s`;
                particle.style.animationDelay = `${Math.random() * 10}s`;

                if (shapes[Math.floor(Math.random() * shapes.length)] === 'diamond') {
                    particle.style.borderRadius = '2px';
                    particle.style.transform = 'rotate(45deg)';
                }

                container.appendChild(particle);
            }
        }

        // ═══════════════════════════════════════
        // ЗВУК ВРАЩЕНИЯ (ОПЦИОНАЛЬНО)
        // ═══════════════════════════════════════

        function playSpinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const duration = 5;
                const sampleRate = audioCtx.sampleRate;

                // Создаём белый шум с модуляцией для эффекта вращения
                const buffer = audioCtx.createBuffer(1, duration * sampleRate, sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < data.length; i++) {
                    const t = i / sampleRate;
                    const progress = t / duration;
                    // Частота модуляции меняется (замедляется к концу)
                    const modFreq = 10 + progress * 40;
                    const amplitude = 0.03 * (1 - progress * 0.7);
                    data[i] = (Math.random() * 2 - 1) * amplitude *
                              (0.5 + 0.5 * Math.sin(2 * Math.PI * modFreq * t));
                }

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 800;
                filter.Q.value = 0.5;

                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                source.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                source.start();
                source.stop(audioCtx.currentTime + duration);
            } catch (e) {
                // Без звука — ничего страшного
            }
        }

        function playWinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const frequencies = [523, 659, 784, 1047]; // C5 E5 G5 C6
                frequencies.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + index * 0.12);
                    gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + index * 0.12 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.12 + 0.4);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + index * 0.12);
                    osc.stop(audioCtx.currentTime + index * 0.12 + 0.4);
                });
            } catch (e) {}
        }

        function playLoseSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {}
        }

        // ═══════════════════════════════════════
        // ОДИНОЧНАЯ РУЛЕТКА
        // ═══════════════════════════════════════

        function selectBet(betType) {
            if (gameState.isSpinning) return;

            // Снимаем выделение со всех кнопок
            $$('.bet-btn').forEach(btn => btn.classList.remove('selected'));

            // Выделяем выбранную
            const btn = document.querySelector(`.bet-btn[data-bet="${betType}"]`);
            if (btn) btn.classList.add('selected');

            gameState.selectedBet = betType;
            vibrate(10);
        }

        function getRandomSpinDegrees() {
            // Случайный угол для колеса (минимум 5 полных оборотов + случайный)
            const fullRotations = 5 + Math.floor(Math.random() * 5); // 5-9 оборотов
            const randomAngle = Math.random() * 360;
            return fullRotations * 360 + randomAngle;
        }

        function spinWheel(targetNumber) {
            return new Promise((resolve) => {
                const wheel = elements.wheelInner;
                const currentRotation = parseFloat(wheel.dataset.rotation || '0');

                // Рассчитываем угол для целевого числа
                // Каждый сектор = 360/37 ≈ 9.73 градуса
                const sectorAngle = 360 / 37;
                const targetAngle = targetNumber * sectorAngle + sectorAngle / 2;

                // Добавляем полные обороты
                const fullRotations = 5 + Math.floor(Math.random() * 5);
                const totalRotation = currentRotation + fullRotations * 360 + (360 - (currentRotation % 360)) + targetAngle;

                wheel.dataset.rotation = totalRotation;
                wheel.style.transform = `rotate(${totalRotation}deg)`;
                wheel.classList.add('spinning');

                // Звук вращения
                playSpinSound();

                // Ждём окончания анимации (5 секунд)
                setTimeout(() => {
                    wheel.classList.remove('spinning');
                    resolve();
                }, 5000);
            });
        }

        async function placeBet() {
            if (gameState.isSpinning) return;

            if (!gameState.selectedBet) {
                showToast('Выберите тип ставки!');
                return;
            }

            const betAmount = parseFloat(elements.betAmount.value) || 0;
            const useFreeSpin = elements.useFreeSpin.checked;

            if (!useFreeSpin && betAmount <= 0) {
                showToast('Введите сумму ставки!');
                return;
            }

            if (!useFreeSpin && betAmount > gameState.balance) {
                showToast('Недостаточно средств!');
                return;
            }

            if (useFreeSpin && gameState.freeSpins <= 0) {
                showToast('Нет бесплатных спинов!');
                return;
            }

            // Блокируем интерфейс
            gameState.isSpinning = true;
            elements.spinBtn.disabled = true;
            elements.spinBtn.textContent = '🎰 ВРАЩЕНИЕ...';
            vibrate(20);

            try {
                // Отправляем запрос на сервер
                const result = await apiCall('/api/game/place_bet', {
                    bet_type: gameState.selectedBet,
                    bet_amount: betAmount,
                    use_free_spin: useFreeSpin
                });

                // Вращаем колесо к целевому числу
                await spinWheel(result.number);

                // Обновляем состояние
                gameState.balance = result.new_balance;
                gameState.freeSpins = result.free_spins;
                if (result.is_win) gameState.totalWins++;
                updateBalanceDisplay();

                // Показываем результат
                showResult(result);
            } catch (error) {
                showToast('Ошибка игры. Попробуйте снова.');
                console.error('Place bet error:', error);
            } finally {
                gameState.isSpinning = false;
                elements.spinBtn.disabled = false;
                elements.spinBtn.textContent = '🎰 SPIN';
                elements.useFreeSpin.checked = false;
            }
        }

        function showResult(result) {
            const overlay = elements.resultOverlay;
            const banner = elements.resultBanner;
            const emoji = elements.resultEmoji;
            const number = elements.resultNumber;
            const amount = elements.resultAmount;
            const message = elements.resultMessage;

            banner.classList.remove('win', 'lose');

            if (result.is_win) {
                banner.classList.add('win');
                emoji.textContent = '🎉';
                amount.textContent = `+${result.win_amount.toFixed(2)}$`;
                amount.style.color = '#00ff41';
                message.textContent = 'ПОЗДРАВЛЯЕМ! ВЫ ВЫИГРАЛИ!';
                playWinSound();
            } else {
                banner.classList.add('lose');
                emoji.textContent = '😢';
                amount.textContent = `-${elements.betAmount.value || '0'}$`;
                amount.style.color = '#e63946';
                message.textContent = 'Повезёт в следующий раз!';
                playLoseSound();
            }

            // Цвет числа
            number.textContent = result.number;
            number.className = 'result-number';
            if (result.color === 'red') number.classList.add('red-num');
            else if (result.color === 'black') number.classList.add('black-num');
            else number.classList.add('green-num');

            // Показываем оверлей
            overlay.classList.remove('hidden');

            // Обновляем отображение под колесом
            const colorNames = { red: 'КРАСНОЕ', black: 'ЧЁРНОЕ', green: 'ZERO' };
            elements.wheelNumberDisplay.innerHTML = `
                Выпало: <span style="color:${result.color === 'red' ? '#e63946' : result.color === 'black' ? '#f0f0f0' : '#00ff41'};font-weight:700;">
                ${result.number} ${colorNames[result.color]}</span>
            `;
        }

        function closeResult() {
            elements.resultOverlay.classList.add('hidden');
            vibrate(10);
        }

        // ═══════════════════════════════════════
        // WEBSOCKET
        // ═══════════════════════════════════════

        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;

            try {
                ws = new WebSocket(`${WS_URL}/ws`);

                ws.onopen = () => {
                    console.log('🔌 WebSocket connected');
                    // Отправляем connect
                    ws.send(JSON.stringify({
                        action: 'connect',
                        user_id: currentUser.id
                    }));

                    // Запрашиваем список комнат
                    ws.send(JSON.stringify({ action: 'get_rooms' }));

                    // Сбрасываем таймер реконнекта
                    if (wsReconnectTimer) {
                        clearTimeout(wsReconnectTimer);
                        wsReconnectTimer = null;
                    }
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleWSMessage(data);
                    } catch (e) {
                        console.error('WS message parse error:', e);
                    }
                };

                ws.onclose = (event) => {
                    console.log('🔌 WebSocket disconnected:', event.code, event.reason);
                    // Реконнект через 3 секунды
                    if (!wsReconnectTimer) {
                        wsReconnectTimer = setTimeout(() => {
                            wsReconnectTimer = null;
                            connectWebSocket();
                        }, 3000);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
            } catch (e) {
                console.error('WebSocket connection error:', e);
            }
        }

        function handleWSMessage(data) {
            console.log('📨 WS:', data.type, data);

            switch (data.type) {
                case 'connected':
                    console.log('✅ Connected to server:', data.message);
                    break;

                case 'rooms_list':
                    gameState.rooms = data.rooms || [];
                    renderRoomsList();
                    break;

                case 'room_created':
                    gameState.currentRoom = data.room_id;
                    gameState.isCreator = true;
                    showMyRoom(data);
                    showToast(`Комната #${data.room_id} создана!`);
                    break;

                case 'joined_room':
                    gameState.currentRoom = data.room_id;
                    gameState.isCreator = false;
                    showMyRoom(data);
                    showToast('Вы присоединились к комнате!');
                    break;

                case 'player_joined':
                    if (gameState.currentRoom === data.room_id || true) {
                        updateRoomDisplay(data);
                    }
                    break;

                case 'player_left':
                    if (gameState.currentRoom === data.room_id || true) {
                        updateRoomDisplay(data);
                    }
                    break;

                case 'left_room':
                    hideMyRoom();
                    showToast(data.message || 'Вы вышли из комнаты');
                    break;

                case 'timer_update':
                    if (gameState.currentRoom && elements.myRoomTimer) {
                        elements.myRoomTimer.textContent = data.time_left;
                    }
                    break;

                case 'game_starting':
                    showToast('🎰 Игра начинается! Вращение...');
                    if (gameState.currentRoom) {
                        elements.startGameBtn.style.display = 'none';
                    }
                    break;

                case 'game_result':
                    showMultiplayerResult(data);
                    break;

                case 'game_cancelled':
                    showToast(data.message || 'Игра отменена');
                    hideMyRoom();
                    fetchUserData();
                    break;

                case 'room_closed':
                    if (gameState.currentRoom === data.room_id || !gameState.currentRoom) {
                        hideMyRoom();
                        fetchUserData();
                    }
                    break;

                case 'error':
                    showToast(data.message || 'Ошибка');
                    break;

                case 'pong':
                    break;

                default:
                    console.log('Unknown WS message:', data);
            }
        }

        function sendWS(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            } else {
                showToast('Нет соединения с сервером');
                connectWebSocket();
            }
        }

        // ═══════════════════════════════════════
        // МУЛЬТИПЛЕЕР
        // ═══════════════════════════════════════

        function createRoom() {
            const betAmount = parseFloat(elements.mpBetAmount.value) || 0;

            if (betAmount <= 0) {
                showToast('Введите сумму ставки!');
                return;
            }

            if (betAmount > gameState.balance) {
                showToast('Недостаточно средств!');
                return;
            }

            vibrate(20);
            sendWS({
                action: 'create_room',
                user_id: currentUser.id,
                bet_amount: betAmount,
                avatar: getRandomAvatar()
            });

            // Оптимистично обновляем баланс
            gameState.balance -= betAmount;
            updateBalanceDisplay();
        }

        function joinRoom(roomId) {
            const betAmount = parseFloat(elements.mpBetAmount.value) || 0;

            if (betAmount <= 0) {
                showToast('Введите сумму ставки!');
                return;
            }

            if (betAmount > gameState.balance) {
                showToast('Недостаточно средств!');
                return;
            }

            vibrate(20);
            sendWS({
                action: 'join_room',
                user_id: currentUser.id,
                room_id: roomId,
                bet_amount: betAmount,
                avatar: getRandomAvatar()
            });

            // Оптимистично обновляем баланс
            gameState.balance -= betAmount;
            updateBalanceDisplay();
        }

        function leaveRoom() {
            if (!gameState.currentRoom) return;

            vibrate(15);
            sendWS({
                action: 'leave_room',
                user_id: currentUser.id,
                room_id: gameState.currentRoom
            });

            hideMyRoom();
            fetchUserData();
        }

        function startMultiplayerGame() {
            if (!gameState.currentRoom || !gameState.isCreator) return;

            vibrate(20);
            sendWS({
                action: 'start_game',
                user_id: currentUser.id,
                room_id: gameState.currentRoom
            });
        }

        function showMyRoom(data) {
            elements.myRoomPanel.classList.remove('hidden');
            elements.myRoomId.textContent = data.room_id || gameState.currentRoom;
            elements.myRoomBank.textContent = `${(data.bank || 0).toFixed(2)}$`;
            elements.myRoomTimer.textContent = data.timer || 30;

            if (data.players) {
                renderRoomPlayers(data.players);
            }

            // Показываем кнопку запуска только создателю при >= 2 игроков
            if (gameState.isCreator && data.players && data.players.length >= 2) {
                elements.startGameBtn.style.display = 'block';
            } else {
                elements.startGameBtn.style.display = 'none';
            }

            // Скрываем список комнат
            elements.roomsList.innerHTML = '';
            elements.noRoomsMsg.classList.add('hidden');
            elements.roomsLoading.classList.add('hidden');
        }

        function hideMyRoom() {
            elements.myRoomPanel.classList.add('hidden');
            elements.mpResultPanel.classList.add('hidden');
            gameState.currentRoom = null;
            gameState.isCreator = false;
            elements.startGameBtn.style.display = 'none';

            // Обновляем список комнат
            sendWS({ action: 'get_rooms' });
        }

        function updateRoomDisplay(data) {
            if (data.players) {
                renderRoomPlayers(data.players);
            }
            if (data.bank !== undefined) {
                elements.myRoomBank.textContent = `${data.bank.toFixed(2)}$`;
            }

            // Проверяем, можно ли запустить игру
            if (gameState.isCreator && data.players && data.players.length >= 2) {
                elements.startGameBtn.style.display = 'block';
            }
        }

        function renderRoomPlayers(players) {
            elements.myRoomPlayers.innerHTML = '';
            players.forEach(player => {
                const badge = document.createElement('span');
                badge.className = 'player-badge';
                badge.style.backgroundColor = player.color || '#555';
                badge.innerHTML = `
                    <span class="player-avatar">${player.avatar || '🎲'}</span>
                    ${escapeHTML(player.nickname || `Player ${player.user_id}`)}
                    <span style="font-size:11px;opacity:0.8;">${(player.bet_amount || 0).toFixed(2)}$</span>
                `;
                elements.myRoomPlayers.appendChild(badge);
            });
        }

        function renderRoomsList() {
            elements.roomsLoading.classList.add('hidden');

            if (!gameState.rooms || gameState.rooms.length === 0) {
                elements.noRoomsMsg.classList.remove('hidden');
                // Очищаем старые карточки
                const oldCards = elements.roomsList.querySelectorAll('.room-card');
                oldCards.forEach(card => card.remove());
                return;
            }

            elements.noRoomsMsg.classList.add('hidden');

            // Очищаем старые карточки
            const oldCards = elements.roomsList.querySelectorAll('.room-card');
            oldCards.forEach(card => card.remove());

            gameState.rooms.forEach(room => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-card-header">
                        <span class="room-id">#${room.room_id}</span>
                        <span class="room-timer">⏱ ${room.time_left || 0}с</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-top:5px;">
                        <span class="room-players">👥 ${room.players_count || 0}/6</span>
                        <span class="room-bank">💰 ${(room.bank || 0).toFixed(2)}$</span>
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (room.players_count < 6) {
                        joinRoom(room.room_id);
                    } else {
                        showToast('Комната заполнена');
                    }
                });
                elements.roomsList.appendChild(card);
            });
        }

        function showMultiplayerResult(data) {
            elements.mpResultPanel.classList.remove('hidden');

            if (data.winner_id === currentUser.id) {
                elements.mpResultEmoji.textContent = '🏆';
                elements.mpResultText.textContent = 'ВЫ ПОБЕДИЛИ!';
                elements.mpResultAmount.textContent = `+${(data.win_amount || 0).toFixed(2)}$`;
                elements.mpResultAmount.style.color = '#00ff41';
                playWinSound();
            } else {
                elements.mpResultEmoji.textContent = '😢';
                elements.mpResultText.textContent = `Победил: ${data.winner_nickname || 'Игрок'}`;
                elements.mpResultAmount.textContent = 'Повезёт в следующий раз!';
                elements.mpResultAmount.style.color = '#e63946';
                playLoseSound();
            }

            // Обновляем баланс
            fetchUserData();

            // Скрываем результат через 5 секунд
            setTimeout(() => {
                elements.mpResultPanel.classList.add('hidden');
                hideMyRoom();
            }, 5000);
        }

        function getRandomAvatar() {
            const avatars = ['🎲', '🎯', '🎰', '🃏', '🎪', '👑', '💎', '🌟', '🔥', '🍀', '🎭', '🦁'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ═══════════════════════════════════════
        // ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
        // ═══════════════════════════════════════

        function switchMode(mode) {
            gameState.mode = mode;
            gameState.selectedBet = null;
            $$('.bet-btn').forEach(btn => btn.classList.remove('selected'));

            if (mode === 'single') {
                elements.tabSingle.classList.add('active');
                elements.tabMulti.classList.remove('active');
                elements.singleGameContent.style.display = 'block';
                elements.multiplayerGameContent.style.display = 'none';
                hideMyRoom();
            } else {
                elements.tabMulti.classList.add('active');
                elements.tabSingle.classList.remove('active');
                elements.singleGameContent.style.display = 'none';
                elements.multiplayerGameContent.style.display = 'block';
                // Подключаем WebSocket и запрашиваем комнаты
                connectWebSocket();
                setTimeout(() => {
                    sendWS({ action: 'get_rooms' });
                }, 500);
            }

            vibrate(10);
        }

        // ═══════════════════════════════════════
        // ОБРАБОТЧИКИ СОБЫТИЙ
        // ═══════════════════════════════════════

        // Табы
        elements.tabSingle.addEventListener('click', () => switchMode('single'));
        elements.tabMulti.addEventListener('click', () => switchMode('multiplayer'));

        // Выбор ставки
        elements.betGrid.addEventListener('click', (e) => {
            const btn = e.target.closest('.bet-btn');
            if (btn && btn.dataset.bet) {
                selectBet(btn.dataset.bet);
            }
        });

        // Кнопка SPIN
        elements.spinBtn.addEventListener('click', () => {
            vibrate(30);
            placeBet();
        });

        // Быстрые ставки
        $$('.quick-bet-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                elements.betAmount.value = btn.dataset.amount;
                vibrate(10);
            });
        });

        // Закрытие результата
        elements.resultCloseBtn.addEventListener('click', closeResult);
        elements.resultOverlay.addEventListener('click', (e) => {
            if (e.target === elements.resultOverlay) {
                closeResult();
            }
        });

        // Мультиплеер
        elements.createRoomBtn.addEventListener('click', createRoom);
        elements.leaveRoomBtn.addEventListener('click', leaveRoom);
        elements.startGameBtn.addEventListener('click', startMultiplayerGame);
        elements.refreshRoomsBtn.addEventListener('click', () => {
            sendWS({ action: 'get_rooms' });
            vibrate(10);
        });

        // Чекбокс бесплатного спина
        elements.useFreeSpin.addEventListener('change', () => {
            if (elements.useFreeSpin.checked && gameState.freeSpins <= 0) {
                elements.useFreeSpin.checked = false;
                showToast('Нет бесплатных спинов!');
            }
        });

        // Обработка клавиатуры для оверлея результата
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !elements.resultOverlay.classList.contains('hidden')) {
                closeResult();
            }
            if (e.key === 'Enter' && gameState.mode === 'single' && !gameState.isSpinning) {
                placeBet();
            }
        });

        // ═══════════════════════════════════════
        // ИНИЦИАЛИЗАЦИЯ
        // ═══════════════════════════════════════

        async function init() {
            console.log('🎡 LN Roulette Mini App initializing...');
            console.log('👤 User:', currentUser);

            // Создаём частицы
            createParticles();

            // Загружаем данные пользователя
            await fetchUserData();

            // Определяем режим из URL параметра
            const urlParams = new URLSearchParams(window.location.search);
            const modeParam = urlParams.get('mode');
            if (modeParam === 'multiplayer') {
                switchMode('multiplayer');
            }

            // Пинг WebSocket каждые 25 секунд для поддержания соединения
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    sendWS({ action: 'ping' });
                }
            }, 25000);

            console.log('✅ Initialization complete');
            console.log('💰 Balance:', gameState.balance);
            console.log('🎁 Free spins:', gameState.freeSpins);
        }

        // Запуск
        init();

        // Обработка закрытия страницы
        window.addEventListener('beforeunload', () => {
            if (gameState.currentRoom) {
                // Пытаемся выйти из комнаты
                try {
                    sendWS({
                        action: 'leave_room',
                        user_id: currentUser.id,
                        room_id: gameState.currentRoom
                    });
                } catch (e) {}
            }
            if (ws) {
                ws.close();
            }
        });

        // Обработка видимости страницы
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                fetchUserData();
                if (gameState.mode === 'multiplayer') {
                    connectWebSocket();
                }
            }
        });

        console.log('🎰 LN Roulette ready!');
    </script>
</body>
</html>
